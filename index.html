<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I Love You Nuray ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Poppins,sans-serif;

}

canvas{

position:fixed;
left:0;
top:0;
width:100%;
height:100%;

}

#stars{

position:fixed;
width:100%;
height:100%;

}

#content{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

text-align:center;

z-index:5;

opacity:0;

animation:showText 5s forwards;
animation-delay:3s;

}

h1{

font-size:70px;

font-weight:700;

color:white;

text-shadow:

0 0 10px #ff3cac,
0 0 20px #ff3cac,
0 0 40px #ff3cac,
0 0 80px #ff3cac;

}

h2{

margin-top:20px;

font-size:42px;

font-weight:300;

color:#ffd3ea;

text-shadow:

0 0 10px hotpink,
0 0 20px hotpink,
0 0 40px hotpink;

}

#made{

margin-top:40px;

color:#bbb;

font-size:16px;

letter-spacing:4px;

}

@keyframes showText{

0%{

opacity:0;
transform:translate(-50%,-40%) scale(.6);

}

100%{

opacity:1;
transform:translate(-50%,-50%) scale(1);

}

}

.heart{

position:absolute;

color:#ff2f74;

font-size:22px;

animation:float 8s linear infinite;

opacity:.8;

}

@keyframes float{

0%{

transform:translateY(100vh) scale(.5);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh) scale(1.5);

opacity:0;

}

}

</style>

</head>

<body>

<canvas id="stars"></canvas>

<div id="content">

<h1>I Love You ❤️</h1>

<h2>Nuray</h2>

<div id="made">
Made with ❤️ by Nihad
</div>

</div>
<script>

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize(){

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

const stars=[];

for(let i=0;i<250;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

r:Math.random()*2+0.3,

s:Math.random()*0.6+0.2

});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

for(const star of stars){

ctx.beginPath();

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fill();

star.y+=star.s;

if(star.y>canvas.height){

star.y=0;
star.x=Math.random()*canvas.width;

}

}

requestAnimationFrame(drawStars);

}

drawStars();

for(let i=0;i<35;i++){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";

heart.style.animationDuration=(5+Math.random()*6)+"s";

heart.style.animationDelay=Math.random()*5+"s";

heart.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(heart);

}
  const shootingStars=[];

for(let i=0;i<5;i++){

shootingStars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height/2,

len:80+Math.random()*100,

speed:8+Math.random()*6

});

}

let mouse={

x:canvas.width/2,
y:canvas.height/2

};

window.addEventListener("mousemove",(e)=>{

mouse.x=e.clientX;
mouse.y=e.clientY;

});

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(const star of stars){

const dx=mouse.x-star.x;
const dy=mouse.y-star.y;

const dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){

star.x-=dx*0.002;
star.y-=dy*0.002;

}

ctx.beginPath();

ctx.fillStyle="white";

ctx.shadowBlur=10;

ctx.shadowColor="white";

ctx.arc(star.x,star.y,star.r,0,Math.PI*2);

ctx.fill();

ctx.shadowBlur=0;

star.y+=star.s;

if(star.y>canvas.height){

star.y=0;
star.x=Math.random()*canvas.width;

}

}

for(const s of shootingStars){

ctx.strokeStyle="rgba(255,255,255,.8)";

ctx.lineWidth=2;

ctx.beginPath();

ctx.moveTo(s.x,s.y);

ctx.lineTo(s.x-s.len,s.y+s.len/2);

ctx.stroke();

s.x+=s.speed;
s.y+=s.speed/3;

if(s.x>canvas.width+200){

s.x=-200;

s.y=Math.random()*canvas.height/2;

}

}

requestAnimationFrame(animate);

}

animate();
  // Yazının yavaş-yavaş nəfəs alması (pulse effekti)

const content = document.getElementById("content");

let scale = 1;
let dir = 1;

setInterval(() => {

    scale += dir * 0.003;

    if (scale > 1.06) dir = -1;
    if (scale < 0.96) dir = 1;

    content.style.transform =
        `translate(-50%,-50%) scale(${scale})`;

}, 30);


// Arxa fonda parıldayan əlavə ulduzlar

setInterval(() => {

    const star = document.createElement("div");

    star.style.position = "fixed";
    star.style.left = Math.random() * innerWidth + "px";
    star.style.top = Math.random() * innerHeight + "px";
    star.style.width = "3px";
    star.style.height = "3px";
    star.style.background = "white";
    star.style.borderRadius = "50%";
    star.style.boxShadow = "0 0 15px white";
    star.style.opacity = "1";
    star.style.transition = "2s";

    document.body.appendChild(star);

    setTimeout(() => {

        star.style.opacity = "0";
        star.style.transform = "scale(3)";

    },100);

    setTimeout(() => {

        star.remove();

    },2200);

},250);


// Yazının rəngini yüngül dəyişdir

const title=document.querySelector("h1");

const colors=[
"#ff3cac",
"#ff5ea8",
"#ff7ecf",
"#ff2d75",
"#ffffff"
];

let ci=0;

setInterval(()=>{

title.style.color=colors[ci];

title.style.textShadow=`
0 0 10px ${colors[ci]},
0 0 20px ${colors[ci]},
0 0 40px ${colors[ci]},
0 0 80px ${colors[ci]}
`;

ci++;

if(ci>=colors.length) ci=0;

},900);
  // Klik etdikdə ürəklər partlasın

document.addEventListener("click",(e)=>{

    for(let i=0;i<18;i++){

        const h=document.createElement("div");

        h.innerHTML="❤️";
        h.style.position="fixed";
        h.style.left=e.clientX+"px";
        h.style.top=e.clientY+"px";
        h.style.fontSize=(16+Math.random()*20)+"px";
        h.style.pointerEvents="none";
        h.style.transition="all 1.8s ease-out";
        h.style.zIndex="9999";

        document.body.appendChild(h);

        const x=(Math.random()-0.5)*250;
        const y=(Math.random()-0.5)*250;

        setTimeout(()=>{

            h.style.transform=`translate(${x}px,${y}px) scale(0) rotate(${Math.random()*360}deg)`;
            h.style.opacity="0";

        },20);

        setTimeout(()=>{

            h.remove();

        },1800);

    }

});


// Mouse izi

document.addEventListener("mousemove",(e)=>{

    const dot=document.createElement("div");

    dot.style.position="fixed";
    dot.style.left=e.clientX+"px";
    dot.style.top=e.clientY+"px";
    dot.style.width="4px";
    dot.style.height="4px";
    dot.style.borderRadius="50%";
    dot.style.background="#ff4da6";
    dot.style.boxShadow="0 0 15px #ff4da6";
    dot.style.pointerEvents="none";
    dot.style.transition="1s linear";
    dot.style.zIndex="999";

    document.body.appendChild(dot);

    setTimeout(()=>{

        dot.style.opacity="0";
        dot.style.transform="scale(4)";

    },20);

    setTimeout(()=>{

        dot.remove();

    },1000);

});


// Səhifə açılanda romantik mesaj

setTimeout(()=>{

    console.log("❤️ I Love You Nuray ❤️");

},4000);
</script>

</body>
</html>
